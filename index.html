<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wordsmith</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap');

  :root{
    --bg:#0A0B0E;
    --surface:#15171C;
    --surface-hover:#1C1F26;
    --line:#262A33;
    --ink:#ECEDEF;
    --muted:#888E99;
    --accent:#8C7CFF;
    --accent-dim:#2A2550;
    --accent-2:#38D6B8;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; min-height:100vh;
    background:var(--bg); color:var(--ink);
    font-family:'Inter',sans-serif;
  }

  .layout{
    display:flex;
    min-height:100vh;
  }

  /* Sidebar */
  .sidebar{
    width:240px; flex-shrink:0;
    border-right:1px solid var(--line);
    padding:24px 16px;
    display:flex; flex-direction:column;
  }
  .sidebar-title{
    font-family:'Fraunces',serif; font-size:15px; font-weight:500;
    margin:0 0 16px; padding:0 4px;
  }
  .new-chat-btn{
    display:flex; align-items:center; gap:8px;
    padding:10px 12px; border-radius:8px;
    border:1px solid var(--line); background:var(--surface);
    color:var(--ink); font-family:'Inter',sans-serif;
    font-size:13px; font-weight:500; cursor:pointer;
    margin-bottom:18px; transition:border-color .15s, background .15s;
  }
  .new-chat-btn:hover{ border-color:var(--accent); background:var(--surface-hover); }
  .new-chat-btn svg{ width:14px; height:14px; }

  .history-label{
    font-size:11px; text-transform:uppercase; letter-spacing:.06em;
    color:#5B616C; padding:0 4px; margin-bottom:8px;
  }
  .history-list{
    display:flex; flex-direction:column; gap:4px;
    overflow-y:auto;
  }
  .history-item{
    text-align:left; background:none; border:none;
    color:var(--muted); font-family:'Inter',sans-serif;
    font-size:13px; padding:8px 8px; border-radius:6px;
    cursor:pointer; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis;
  }
  .history-item:hover{ background:var(--surface); color:var(--ink); }
  .history-empty{
    font-size:12.5px; color:#4A4F58; padding:8px; line-height:1.5;
  }

  /* Main content */
  .wrap{
    flex:1; max-width:680px; margin:0 auto;
    min-height:100vh;
    display:flex; flex-direction:column;
    justify-content:center;
    padding:64px 20px;
  }

  .greeting{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:34px;
    text-align:center;
    letter-spacing:-0.01em;
    margin:0 0 8px;
    opacity:0;
    animation:rise .6s ease forwards;
  }
  .greeting em{
    font-style:italic; color:var(--accent);
  }
  .subtitle{
    text-align:center; color:var(--muted);
    font-size:14px; margin:0 0 40px;
    opacity:0;
    animation:rise .6s ease .1s forwards;
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .console{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    padding:6px;
    opacity:0;
    animation:rise .6s ease .18s forwards;
  }
  textarea{
    width:100%; min-height:90px;
    background:transparent; border:none;
    color:var(--ink); font-family:'Inter',sans-serif;
    font-size:15px; line-height:1.6;
    padding:14px 14px 6px;
    resize:none;
  }
  textarea:focus{ outline:none; }
  textarea::placeholder{ color:#5B616C; }

  .console-footer{
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 8px 6px 12px;
  }
  .hint{ font-size:12px; color:#5B616C; }
  .char-count{ font-size:12px; color:#5B616C; }
  .char-count.near-limit{ color:#E5A15C; }
  .char-count.over-limit{ color:#E5605C; }

  .options{
    display:flex; flex-wrap:wrap; gap:8px;
    margin:16px 0 0;
    opacity:0;
    animation:rise .6s ease .26s forwards;
  }
  .pill{
    display:flex; align-items:center; gap:6px;
    padding:9px 16px; border-radius:20px;
    border:1px solid var(--line); background:var(--surface);
    color:var(--ink); font-family:'Inter',sans-serif;
    font-size:13px; font-weight:500; cursor:pointer;
    transition:border-color .15s, background .15s, transform .1s;
  }
  .pill:hover{ border-color:var(--accent); background:var(--surface-hover); }
  .pill:active{ transform:scale(0.97); }
  .pill.active{ background:var(--accent-dim); border-color:var(--accent); color:#D8D2FF; }
  .pill svg{ width:14px; height:14px; }
  .pill.ghost{ background:transparent; }

  .status{
    font-size:13px; color:var(--muted);
    min-height:20px; margin:18px 2px 0;
  }
  .status.thinking::after{
    content:''; display:inline-block; width:6px; height:6px;
    margin-left:6px; border-radius:50%; background:var(--accent);
    animation:pulse 1s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{ opacity:.3; } 50%{ opacity:1; } }

  .results{
    display:flex; flex-direction:column; gap:10px;
    margin-top:12px;
  }
  .result-card{
    background:var(--surface); border:1px solid var(--line);
    border-radius:12px; padding:14px 16px;
    opacity:0; animation:rise .4s ease forwards;
  }
  .result-card.email{ border-color:var(--accent-dim); }
  .result-card .label{
    font-family:'Fraunces',serif; font-size:12px; font-weight:500;
    color:var(--accent); text-transform:uppercase; letter-spacing:.06em;
    margin-bottom:6px;
  }
  .result-card .body{
    font-size:14.5px; line-height:1.65; white-space:pre-wrap; color:#DADCE0;
  }
  .copy-btn{
    margin-top:10px; font-size:11.5px; color:var(--muted);
    background:none; border:none; cursor:pointer; padding:0;
    font-family:'Inter',sans-serif;
  }
  .copy-btn:hover{ color:var(--accent-2); }

  footer{
    margin-top:56px; font-size:12px; color:#4A4F58; text-align:center;
    line-height:1.8;
  }
  footer .byline{ color:#3A3E46; font-size:11.5px; }

  .hidden{ display:none !important; }

  @media (max-width: 820px){
    .sidebar{ display:none; }
  }
</style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-title">Wordsmith</div>
    <button class="new-chat-btn" id="new-chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      New chat
    </button>
    <div class="history-label">History</div>
    <div class="history-list" id="history-list">
      <div class="history-empty">Your past rephrases and emails will show up here — saved only in this browser.</div>
    </div>
  </aside>

  <div class="wrap">
    <h1 class="greeting">Say it <em>better</em></h1>
    <p class="subtitle">Paste a rough line. Pick how it should land.</p>

    <div class="console">
      <textarea id="input" placeholder="need that report asap dont care how"></textarea>
      <div class="console-footer">
        <span class="hint">⌘ + Enter to rephrase</span>
        <span class="char-count" id="char-count">0/3000</span>
      </div>
    </div>

    <div class="options" id="options">
      <button class="pill" data-mode="rephrase">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h10M4 17h13"/></svg>
        Rephrase
      </button>
      <button class="pill" data-mode="email">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
        Email
      </button>
      <button class="pill" data-mode="straightforward">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        Straightforward
      </button>
    </div>

    <div class="status" id="status"></div>
    <div class="results" id="results"></div>

    <footer>
      Wordsmith is open source.<br>
      <span class="byline">By - Bhagyesh Janna.</span>
    </footer>
  </div>
</div>

<script>
const STYLES = ["Polite","Professional","Friendly","Concise","Formal","Assertive"];
const HISTORY_KEY = 'ws_history';
const MAX_HISTORY = 20;
const MAX_CHARS = 3000;

const inputEl = document.getElementById('input');
const charCountEl = document.getElementById('char-count');

function updateCharCount(){
  const len = inputEl.value.length;
  charCountEl.textContent = `${len}/${MAX_CHARS}`;
  charCountEl.className = 'char-count' + (len > MAX_CHARS ? ' over-limit' : len > MAX_CHARS * 0.9 ? ' near-limit' : '');
}
inputEl.addEventListener('input', updateCharCount);

function getHistory(){
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
  catch(e){ return []; }
}

function saveHistory(entry){
  const hist = getHistory();
  hist.unshift(entry); // newest first
  if (hist.length > MAX_HISTORY) hist.length = MAX_HISTORY;
  localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
  renderHistory();
}

function renderHistory(){
  const list = document.getElementById('history-list');
  const hist = getHistory();
  if (!hist.length){
    list.innerHTML = `<div class="history-empty">Your past rephrases and emails will show up here — saved only in this browser.</div>`;
    return;
  }
  list.innerHTML = "";
  hist.forEach((entry) => {
    const btn = document.createElement('button');
    btn.className = 'history-item';
    btn.textContent = entry.text;
    btn.title = entry.text;
    btn.onclick = () => {
      document.getElementById('input').value = entry.text;
      document.querySelectorAll('.pill[data-mode]').forEach(p => p.classList.toggle('active', p.dataset.mode === entry.mode));
      if (entry.mode === 'rephrase') renderRephrase(entry.raw);
      else if (entry.mode === 'straightforward') renderStraightforward(entry.raw);
      else renderEmail(entry.raw);
      document.getElementById('status').textContent = "";
    };
    list.appendChild(btn);
  });
}

async function callBackend(mode, text){
  const response = await fetch("/api/rephrase", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ mode, text })
  });
  if (!response.ok) {
    const errText = await response.text();
    throw new Error("Server error " + response.status + ": " + errText.slice(0,200));
  }
  const data = await response.json();
  return data.result;
}

function renderRephrase(raw){
  const results = document.getElementById('results');
  results.innerHTML = "";
  let i = 0;
  STYLES.forEach(s => {
    const re = new RegExp(s + ":\\s*(.+)");
    const m = raw.match(re);
    if (m && m[1].trim()){
      const card = document.createElement('div');
      card.className = 'result-card';
      card.style.animationDelay = (i * 0.05) + 's';
      card.innerHTML = `<div class="label">${s}</div><div class="body">${m[1].trim()}</div><button class="copy-btn">Copy</button>`;
      card.querySelector('.copy-btn').onclick = () => navigator.clipboard.writeText(m[1].trim());
      results.appendChild(card);
      i++;
    }
  });
  if (!results.children.length){
    results.innerHTML = `<div class="result-card"><div class="body">${raw}</div></div>`;
  }
}

function renderEmail(raw){
  const results = document.getElementById('results');
  const card = document.createElement('div');
  card.className = 'result-card email';
  card.innerHTML = `<div class="label">Email draft</div><div class="body"></div><button class="copy-btn">Copy</button>`;
  card.querySelector('.body').textContent = raw;
  card.querySelector('.copy-btn').onclick = () => navigator.clipboard.writeText(raw);
  results.innerHTML = "";
  results.appendChild(card);
}

function renderStraightforward(raw){
  const results = document.getElementById('results');
  const card = document.createElement('div');
  card.className = 'result-card';
  card.innerHTML = `<div class="label">Straightforward</div><div class="body"></div><button class="copy-btn">Copy</button>`;
  card.querySelector('.body').textContent = raw.trim();
  card.querySelector('.copy-btn').onclick = () => navigator.clipboard.writeText(raw.trim());
  results.innerHTML = "";
  results.appendChild(card);
}

async function run(mode){
  const text = document.getElementById('input').value.trim();
  const status = document.getElementById('status');
  const results = document.getElementById('results');
  if (!text){ status.textContent = "Type something first."; status.className = "status"; return; }
  if (text.length > MAX_CHARS){ status.textContent = `Please keep it under ${MAX_CHARS} characters.`; status.className = "status"; return; }

  document.querySelectorAll('.pill[data-mode]').forEach(p => p.classList.toggle('active', p.dataset.mode === mode));

  status.textContent = "Thinking";
  status.className = "status thinking";
  results.innerHTML = "";
  try {
    const raw = await callBackend(mode, text);
    status.textContent = "";
    status.className = "status";
    if (mode === 'rephrase') renderRephrase(raw);
    else if (mode === 'straightforward') renderStraightforward(raw);
    else renderEmail(raw);
    saveHistory({ mode, text, raw, ts: Date.now() });
  } catch (err){
    console.error('Wordsmith error:', err.message); // full detail stays in browser console for debugging
    status.textContent = "High engagement right now — please refresh or try again in a moment.";
    status.className = "status";
  }
}

document.querySelectorAll('.pill[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => run(btn.dataset.mode));
});

document.getElementById('input').addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') run('rephrase');
});

document.getElementById('new-chat').addEventListener('click', () => {
  document.getElementById('input').value = "";
  document.getElementById('results').innerHTML = "";
  document.getElementById('status').textContent = "";
  document.querySelectorAll('.pill[data-mode]').forEach(p => p.classList.remove('active'));
  document.getElementById('input').focus();
});

renderHistory();
</script>

</body>
</html>
